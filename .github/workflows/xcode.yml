name: Xcode Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Build simulator target
        run: xcodebuild -project TerminalOpsGame.xcodeproj -scheme TerminalOpsGame -destination 'platform=iOS Simulator,name=iPhone 15' build
